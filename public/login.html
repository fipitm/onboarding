<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Planning Portal</title>
  <link rel="icon" type="image/png" href="/fip-logo.png">
  <link rel="preload" as="image" href="/fip-logo-login.png" type="image/png">
  <link rel="preload" as="image" href="/fip-wallpaper.jpg" type="image/jpeg">
  <style>
    :root {
      --blue-1: #15294c;
      --blue-2: #274a7b;
      --blue-3: #335d99;
      --input-border: #d6dbe6;
      --muted: #7b8397;
      --text: #1d2433;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(8, 22, 45, 0.75) 0%, rgba(16, 44, 88, 0.7) 50%, rgba(8, 22, 45, 0.75) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.3) 100%),
        url("/fip-wallpaper.jpg") center center / cover no-repeat fixed,
        linear-gradient(180deg, rgba(141, 198, 63, 0.12) 0%, transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: 360px;
      max-width: calc(100% - 32px);
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.97);
      padding: 32px 28px 24px;
      box-shadow: 0 16px 40px rgba(6, 13, 28, 0.28);
      backdrop-filter: blur(4px);
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo-wrap img {
      width: auto;
      height: 84px;
    }
    .login-title {
      margin: 8px 0 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0.2px;
    }
    h1 {
      display: none;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-size: 13px;
      color: #334155;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      color: #0f172a;
    }
    input::placeholder { color: #94a3b8; }
    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      background: #fff;
      padding-right: 56px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      width: auto;
      margin: 0;
      font-weight: 600;
    }
    .submit-btn {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 6px;
      background: #0f172a;
      color: #fff;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .submit-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #0f172a;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
      background: none;
      box-shadow: none;
      padding: 0;
    }
    .remember-row label {
      margin: 0;
      font-size: 13px;
      color: #475569;
      font-weight: 500;
      cursor: pointer;
    }
    .msg {
      margin-top: 12px;
      min-height: 18px;
      color: #be123c;
      font-size: 14px;
      text-align: left;
    }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="logo-wrap">
      <img
        src="/fip-logo-login.png"
        alt="FIP logo"
        width="96"
        height="96"
        loading="eager"
        decoding="async"
        fetchpriority="high"
      >
      <p class="login-title">Onboarding Portal</p>
    </div>
    <h1>Sign in</h1>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required autocomplete="username" placeholder="Enter your username">
    <label for="password">Password</label>
    <div class="password-wrap">
      <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password">
      <button type="button" class="toggle-password" id="togglePassword">Show</button>
    </div>
    <div class="remember-row">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">Remember me</label>
    </div>
    <button class="submit-btn" type="submit">Sign in</button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    async function checkSession() {
      const res = await fetch("/api/auth/me");
      const data = await res.json();
      if (data.user) window.location.href = "/planner.html";
    }
    checkSession();

    // Load saved credentials
    const saved = JSON.parse(localStorage.getItem("fip_remember") || "null");
    if (saved) {
      document.getElementById("username").value = saved.username || "";
      document.getElementById("password").value = saved.password || "";
      document.getElementById("rememberMe").checked = true;
    }

    document.getElementById("togglePassword").addEventListener("click", () => {
      const password = document.getElementById("password");
      const toggle = document.getElementById("togglePassword");
      const isHidden = password.type === "password";
      password.type = isHidden ? "text" : "password";
      toggle.textContent = isHidden ? "Hide" : "Show";
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("rememberMe").checked;

      if (remember) {
        localStorage.setItem("fip_remember", JSON.stringify({ username, password }));
      } else {
        localStorage.removeItem("fip_remember");
      }

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || "Login failed.";
        return;
      }
      window.location.href = "/planner.html";
    });
  </script>
</body>
</html>
