<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FIP Onboarding Portal</title>
  <link rel="icon" type="image/png" href="/fip-logo.png">
  <link rel="stylesheet" href="/v2/assets/style.css">
</head>
<body class="login-bg">

  <form class="login-card" id="loginForm" novalidate>
    <div class="login-card-accent"></div>
    <div class="login-logo-wrap">
      <img src="/fip-logo-login.png" alt="FIP logo" width="80" height="80" loading="eager">
      <p class="login-title">Onboarding Portal</p>
      <p class="login-subtitle">FIP × Almarai Sales Program</p>
    </div>

    <hr class="login-divider">

    <div class="form-group">
      <label class="login-label" for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        class="login-input"
        required
        autocomplete="username"
        placeholder="Enter your username"
      >
    </div>

    <div class="form-group">
      <label class="login-label" for="password">Password</label>
      <div class="login-pw-wrap">
        <input
          id="password"
          name="password"
          type="password"
          class="login-input"
          required
          autocomplete="current-password"
          placeholder="Enter your password"
        >
        <button type="button" class="login-pw-toggle" id="togglePw">Show</button>
      </div>
    </div>

    <div class="login-remember">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">Remember me</label>
    </div>

    <button class="login-btn" type="submit" id="submitBtn">Sign in</button>
    <div class="login-msg" id="msg" role="alert" aria-live="polite"></div>

    <p class="login-footer">FIP Sales Program &mdash; Onboarding Planning Tool</p>
  </form>

  <script>
    /* Check for an existing session first */
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        const { user } = await res.json();
        if (user) redirect(user.role);
      } catch (_) {}
    })();

    /* Restore saved credentials */
    const saved = JSON.parse(localStorage.getItem('fip_remember_v2') || 'null');
    if (saved) {
      document.getElementById('username').value = saved.username || '';
      document.getElementById('password').value = saved.password || '';
      document.getElementById('rememberMe').checked = true;
    }

    /* Password toggle */
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw  = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      const show = pw.type === 'password';
      pw.type     = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });

    /* Login submit */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg      = document.getElementById('msg');
      const btn      = document.getElementById('submitBtn');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;

      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      if (remember) {
        localStorage.setItem('fip_remember_v2', JSON.stringify({ username, password }));
      } else {
        localStorage.removeItem('fip_remember_v2');
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.error || 'Login failed. Please check your credentials.';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        redirect(data.user?.role);
      } catch (_) {
        msg.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    function redirect(role) {
      window.location.href = role === 'admin'
        ? '/v2/admin/dashboard.html'
        : '/v2/planner.html';
    }
  </script>
</body>
</html>
