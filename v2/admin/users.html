<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Manage Users — FIP Onboarding</title>
  <link rel="icon" type="image/png" href="/fip-logo.png">
  <link rel="stylesheet" href="/v2/assets/style.css">
  <style>
    /* Users-page-specific additions */
    .mhdr-right { display: flex; align-items: center; gap: 8px; }
    .user-count  { font-size: 12px; color: var(--text3); }

    .create-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 16px;
      display: none;
    }
    .create-panel.open { display: block; }
    .cp-title { font-size: 14px; font-weight: 700; color: var(--text1); margin-bottom: 16px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field .form-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .nm-cell { display: flex; align-items: center; gap: 8px; }
    .mu { color: var(--text3); }
    .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    /* Inline table action buttons */
    .act-btn {
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .12s;
    }
    .act-btn:hover { opacity: .8; }
    .act-edit   { background: var(--surface); color: var(--navy); border: 1px solid var(--border-strong); }
    .act-save   { background: var(--navy); color: #fff; border: 1px solid var(--navy); }
    .act-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .act-pw     { background: var(--success-light); color: var(--success); }
    .act-off    { background: var(--danger-light);  color: var(--danger); }
    .act-on     { background: var(--success-light); color: var(--success); }
    .act-group  { display: flex; gap: 4px; flex-wrap: wrap; }

    .pw-notify { font-size: 12px; min-height: 16px; margin-top: 8px; }
    .pw-notify.ok  { color: var(--success); }
    .pw-notify.err { color: var(--danger); }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-wrap"><img src="/fip-logo-white.png" alt="FIP"></div>
      <div>
        <div class="sb-brand-name">FIP Sales Program</div>
        <div class="sb-brand-sub">Onboarding Planner</div>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="sb-sect">Menu</div>
      <a class="nav-item" href="/v2/admin/dashboard.html"><span class="ni">📊</span> Dashboard</a>
      <a class="nav-item" href="/v2/admin/dashboard.html#analytics"><span class="ni">📈</span> Analytics</a>
      <a class="nav-item" href="/v2/admin/dashboard.html#submissions"><span class="ni">📋</span> Submissions</a>
      <a class="nav-item" href="/v2/admin/dashboard.html#planner"><span class="ni">🗂</span> Planner View</a>
      <div class="sb-sect">Admin</div>
      <a class="nav-item active" href="/v2/admin/users.html"><span class="ni">👥</span> Manage Users</a>
    </nav>

    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-av" id="adminAvatar">A</div>
        <div>
          <div class="sb-uname" id="adminName">Admin</div>
          <div class="sb-urole">Administrator</div>
        </div>
      </div>
      <button class="sb-logout" id="logoutBtn">
        <span style="font-size:14px;">↩</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="main-hdr">
      <div class="mhdr-left">
        <span class="mhdr-crumb">Admin</span>
        <span class="mhdr-sep">/</span>
        <span class="mhdr-title">Manage Users</span>
      </div>
      <div class="mhdr-right">
        <span class="user-count" id="userCount"></span>
        <button class="btn btn-primary btn-sm" onclick="toggleCreatePanel()">+ New User</button>
      </div>
    </header>

    <div class="main-content">

      <!-- Create panel -->
      <div class="create-panel" id="createPanel">
        <div class="cp-title">➕ Create New User</div>
        <form id="createForm" onsubmit="createUser(event)">
          <div class="form-grid">
            <div class="form-field">
              <label class="form-label">Username</label>
              <input class="form-input" id="newUsername" placeholder="e.g. john_lm" required autocomplete="off">
            </div>
            <div class="form-field">
              <label class="form-label">Display Name</label>
              <input class="form-input" id="newDisplayName" placeholder="e.g. John Smith" required>
            </div>
            <div class="form-field">
              <label class="form-label">Password</label>
              <input class="form-input" id="newPassword" type="password" placeholder="Minimum 6 characters" required>
            </div>
            <div class="form-field">
              <label class="form-label">Role</label>
              <select class="form-select" id="newRole">
                <option value="user">User (Line Manager)</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create User</button>
            <button type="button" class="btn btn-ghost" onclick="toggleCreatePanel()">Cancel</button>
          </div>
          <div class="notify" id="createMsg"></div>
        </form>
      </div>

      <!-- Users table -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">All Users</div></div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Display Name</th>
                <th>Role</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTbody">
              <tr><td colspan="6"><div class="empty-state">Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="notify" id="listMsg"></div>
      </div>

    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay hidden" id="pwModal" onclick="if(event.target===this)closePwModal()">
  <div class="modal" style="width:360px;">
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Reset Password</div>
        <div style="font-size:12px;color:var(--text3);margin-top:3px;" id="pwModalUser">—</div>
      </div>
      <button class="modal-close" onclick="closePwModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" id="newPwInput" type="password" placeholder="Enter new password" autocomplete="new-password">
      </div>
      <div class="pw-notify" id="pwNotify"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-primary" onclick="confirmReset()">Save Password</button>
      <button class="btn btn-ghost" onclick="closePwModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/v2/assets/app.js"></script>
<script>
  let allUsers = [], pwTargetId = null;
  function byId(i) { return document.getElementById(i); }

  /* ── Row HTML ───────────────────────────────────────────────────────── */
  function rowHtml(u, editing = false) {
    const active  = u.is_active === 1 || u.is_active === true;
    const ini     = initials(u.display_name || u.username);
    const col     = avColor(u.display_name || u.username);
    const created = u.created_at ? u.created_at.slice(0, 10) : '—';

    const statusBadge = active
      ? '<span class="badge badge-active">● Active</span>'
      : '<span class="badge badge-inactive">● Inactive</span>';
    const roleBadge = u.role === 'admin'
      ? '<span class="badge badge-admin">Admin</span>'
      : '<span class="badge badge-user">User</span>';
    const av = `<div class="av" style="width:28px;height:28px;background:${col};">${ini}</div>`;

    if (editing) {
      return `<tr id="row_${u.id}">
        <td><div class="nm-cell">${av}<strong>${u.username}</strong></div></td>
        <td><input class="tbl-input" id="dn_${u.id}" value="${(u.display_name || '').replace(/"/g, '&quot;')}"></td>
        <td><select class="tbl-select" id="role_${u.id}">
          <option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option>
          <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
        </select></td>
        <td>${statusBadge}</td>
        <td class="mu" style="font-size:11px;">${created}</td>
        <td><div class="act-group">
          <button class="act-btn act-save" onclick="saveUser(${u.id})">Save</button>
          <button class="act-btn act-cancel" onclick="loadUsers()">Cancel</button>
        </div></td>
      </tr>`;
    }

    return `<tr id="row_${u.id}">
      <td><div class="nm-cell">${av}<strong>${u.username}</strong></div></td>
      <td>${u.display_name || '<span class="mu">—</span>'}</td>
      <td>${roleBadge}</td>
      <td>${statusBadge}</td>
      <td class="mu" style="font-size:11px;">${created}</td>
      <td><div class="act-group">
        <button class="act-btn act-edit" onclick="editRow(${u.id})">Edit</button>
        <button class="act-btn act-pw" onclick="openPwModal(${u.id},'${u.username}')">Password</button>
        <button class="act-btn ${active ? 'act-off' : 'act-on'}" onclick="toggleUser(${u.id},${!active})">
          ${active ? 'Deactivate' : 'Activate'}
        </button>
      </div></td>
    </tr>`;
  }

  /* ── Load users ─────────────────────────────────────────────────────── */
  async function loadUsers() {
    const data = await api('/api/admin/users');
    allUsers = data.users || [];
    const total  = allUsers.length;
    const active = allUsers.filter(u => u.is_active === 1 || u.is_active === true).length;
    byId('userCount').textContent = `${total} user${total !== 1 ? 's' : ''} · ${active} active`;
    byId('usersTbody').innerHTML = allUsers.length
      ? allUsers.map(u => rowHtml(u)).join('')
      : `<tr><td colspan="6"><div class="empty-state">No users yet.</div></td></tr>`;
    byId('listMsg').textContent = '';
  }

  /* ── Inline edit ────────────────────────────────────────────────────── */
  function editRow(id) {
    const u = allUsers.find(u => u.id === id);
    if (!u) return;
    byId('row_' + id).outerHTML = rowHtml(u, true);
    byId('dn_' + id).focus();
  }

  async function saveUser(id) {
    const dn   = byId('dn_'   + id).value.trim();
    const role = byId('role_' + id).value;
    try {
      await api(`/api/admin/users/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ displayName: dn, role })
      });
      showMsg('listMsg', '✓ User updated.', 'ok');
      await loadUsers();
    } catch (e) { showMsg('listMsg', e.message, 'err'); }
  }

  /* ── Toggle active ──────────────────────────────────────────────────── */
  async function toggleUser(id, isActive) {
    try {
      await api(`/api/admin/users/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isActive })
      });
      showMsg('listMsg', `✓ User ${isActive ? 'activated' : 'deactivated'}.`, 'ok');
      await loadUsers();
    } catch (e) { showMsg('listMsg', e.message, 'err'); }
  }

  /* ── Create user ────────────────────────────────────────────────────── */
  function toggleCreatePanel() {
    const p = byId('createPanel');
    p.classList.toggle('open');
    if (p.classList.contains('open')) {
      byId('newUsername').focus();
      byId('createMsg').textContent = '';
    }
  }

  async function createUser(e) {
    e.preventDefault();
    const msg = byId('createMsg');
    msg.textContent = '';
    msg.className = 'notify';
    try {
      await api('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username:    byId('newUsername').value.trim(),
          displayName: byId('newDisplayName').value.trim(),
          password:    byId('newPassword').value,
          role:        byId('newRole').value
        })
      });
      showMsg('createMsg', '✓ User created successfully.', 'ok');
      e.target.reset();
      await loadUsers();
      setTimeout(() => byId('createPanel').classList.remove('open'), 1200);
    } catch (err) { showMsg('createMsg', err.message, 'err'); }
  }

  /* ── Password modal ─────────────────────────────────────────────────── */
  function openPwModal(id, username) {
    pwTargetId = id;
    byId('pwModalUser').textContent = username;
    byId('newPwInput').value = '';
    byId('pwNotify').textContent = '';
    byId('pwModal').classList.remove('hidden');
    setTimeout(() => byId('newPwInput').focus(), 100);
  }
  function closePwModal() { byId('pwModal').classList.add('hidden'); pwTargetId = null; }

  async function confirmReset() {
    const pw  = byId('newPwInput').value;
    const ntf = byId('pwNotify');
    if (!pw || pw.length < 6) {
      ntf.textContent = 'Password must be at least 6 characters.';
      ntf.className = 'pw-notify err';
      return;
    }
    try {
      await api(`/api/admin/users/${pwTargetId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      ntf.textContent = '✓ Password reset successfully.';
      ntf.className = 'pw-notify ok';
      setTimeout(closePwModal, 1200);
    } catch (e) { ntf.textContent = e.message; ntf.className = 'pw-notify err'; }
  }

  function showMsg(id, txt, type) {
    const el = byId(id);
    el.textContent = txt;
    el.className = 'notify ' + type;
  }

  /* ── Init ───────────────────────────────────────────────────────────── */
  (async () => {
    const user = await requireAuth('admin');
    if (!user) return;
    const uname = user.display_name || user.username || 'Admin';
    byId('adminName').textContent = uname;
    byId('adminAvatar').textContent = initials(uname);
    byId('adminAvatar').style.background = avColor(uname);
    await loadUsers();
  })();
</script>
</body>
</html>
